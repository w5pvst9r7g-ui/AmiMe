name: Deploy to GitHub Pages

# Publishes the static front-end so it can be opened from any device (e.g. iOS
# Safari) at the repo's Pages URL. The site uses the on-device matcher — no
# backend or API key is involved. (Public hosting authorised by the repo owner.)

on:
  push:
    branches: ["claude/charm-story-matcher-poc-BpNJF"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
